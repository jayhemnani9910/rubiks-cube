name: Bug report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Select 4x4 cube
        3. Press ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser + OS
      placeholder: Chrome 126 on macOS 14
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Running where?
      description: Live demo, local `npm run dev`, or opening `index.html` directly?
    validations:
      required: true
  - type: textarea
    id: console
    attributes:
      label: Console errors (if any)
      render: shell
